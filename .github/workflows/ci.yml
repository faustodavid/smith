name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src
      - name: Unit tests
        run: |
          pytest tests/unit tests/contract --cov=src/smith --cov-report=term-missing -q
          python scripts/check_targeted_coverage.py

  integration:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Provider smoke tests
        env:
          AZURE_CLIENT_ID: ${{ secrets.SMITH_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.SMITH_AZURE_CLIENT_SECRET }}
          AZURE_DEVOPS_ORG: ${{ secrets.SMITH_AZURE_DEVOPS_ORG }}
          AZURE_TENANT_ID: ${{ secrets.SMITH_AZURE_TENANT_ID }}
          GITHUB_ORG: ${{ secrets.SMITH_GITHUB_ORG }}
          GITHUB_TOKEN: ${{ secrets.SMITH_GITHUB_TOKEN }}
          SMITH_TEST_AZDO_BUILD_ID: ${{ secrets.SMITH_TEST_AZDO_BUILD_ID }}
          SMITH_TEST_AZDO_PR_ID: ${{ secrets.SMITH_TEST_AZDO_PR_ID }}
          SMITH_TEST_AZDO_PROJECT: ${{ secrets.SMITH_TEST_AZDO_PROJECT }}
          SMITH_TEST_AZDO_REPO: ${{ secrets.SMITH_TEST_AZDO_REPO }}
          SMITH_TEST_AZDO_SEARCH_QUERY: ${{ secrets.SMITH_TEST_AZDO_SEARCH_QUERY }}
          SMITH_TEST_AZDO_WORK_ITEM_ID: ${{ secrets.SMITH_TEST_AZDO_WORK_ITEM_ID }}
          SMITH_TEST_GITHUB_ISSUE_ID: ${{ secrets.SMITH_TEST_GITHUB_ISSUE_ID }}
          SMITH_TEST_GITHUB_PR_ID: ${{ secrets.SMITH_TEST_GITHUB_PR_ID }}
          SMITH_TEST_GITHUB_REPO: ${{ secrets.SMITH_TEST_GITHUB_REPO }}
          SMITH_TEST_GITHUB_RUN_ID: ${{ secrets.SMITH_TEST_GITHUB_RUN_ID }}
          SMITH_TEST_GITHUB_SEARCH_QUERY: ${{ secrets.SMITH_TEST_GITHUB_SEARCH_QUERY }}
        run: pytest tests/integration -q --run-integration
