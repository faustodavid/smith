name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src
      - name: Unit tests
        run: |
          pytest --cov=src/smith --cov-report=term-missing -q
          python scripts/check_targeted_coverage.py
